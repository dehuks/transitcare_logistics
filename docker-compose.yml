version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - '80:80'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - 'com.transitcare.service=web'
      - 'com.transitcare.environment=production'
