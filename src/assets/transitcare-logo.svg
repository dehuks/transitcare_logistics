  <!-- Dark navy accent square (top-left of T) -->
  <rect x="0" y="14" width="21" height="21" fill="#1e3a5f"/>
  <!-- T vertical stem -->
  <rect x="23" y="14" width="22" height="52" fill="#4a9fd4"/>

  <!-- "ransitcare" — baseline y=66, continuing from T -->
  <text
    x="74"
    y="66"
    font-family="'Arial Black', 'Arial', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="62"
    fill="#4a9fd4"
    letter-spacing="-0.5"
  >ransitcare</text>

  <!-- "logistics" — gray, lowercase, wide spacing -->
  <text
    x="1"
    y="106"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
